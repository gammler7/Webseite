<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="main-nav" aria-label="Hauptnavigation">
    <ul>
      <li><a href="index.html">Startseite</a></li>
      <li><a href="skills.html" class="active">Skills</a></li>
    </ul>
  </nav>
  <div class="content content-neuigkeiten">
    <p class="announce-back-on" role="status">Seit dem 4.4.26 arbeite ich wieder.</p>
    <section class="skills-animate-demo" aria-label="Animation Testbereich">
      <h2 class="skills-animate-demo__title">Animationen (Testbereich)</h2>
      <p class="skills-animate-demo__subtitle">Aktuell: <strong><span id="skills-days-value">8</span> von 30 Tagen</strong></p>
      <div class="skills-progress">
        <div class="skills-progress__label">
          <span>Monatliche Arbeitstage</span>
          <span id="skills-progress-percent">8/30 Tage</span>
        </div>
        <div class="skills-progress__track" role="progressbar" aria-valuemin="0" aria-valuemax="30" aria-valuenow="8" aria-label="Arbeitstage im Monat">
          <div id="skills-progress-fill" class="skills-progress__fill"></div>
        </div>
      </div>
      <p>So viel arbeite ich momentan/ Monat</p>
    </section>
    <div id="neuigkeiten-markdown" class="markdown-content" aria-live="polite">
      <p>Lade Neuigkeiten …</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      function setzeArbeitslosDauer() {
        var span = document.getElementById('arbeitslos-dauer');
        if (!span) return;
        var start = new Date(2025, 6, 2);  // 2. Juli 2025
        var heute = new Date();
        start.setHours(0, 0, 0, 0);
        heute.setHours(0, 0, 0, 0);
        var monate = 0;
        var d = new Date(start.getTime());
        while (true) {
          var naechster = new Date(d.getFullYear(), d.getMonth() + 1, d.getDate());
          if (naechster > heute) break;
          d = naechster;
          monate++;
        }
        var tage = Math.floor((heute - d) / (1000 * 60 * 60 * 24));
        span.textContent = monate + ' Monate und ' + tage + ' Tage';
      }

      function initScrollReveal(root) {
        if (!root || typeof IntersectionObserver === 'undefined') return;
        var targets = root.querySelectorAll('h1, h2, h3, p, ul, ol, li, blockquote');
        for (var i = 0; i < targets.length; i++) {
          targets[i].classList.add('reveal-item');
        }
        var observer = new IntersectionObserver(function(entries, obs) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              obs.unobserve(entry.target);
            }
          });
        }, { threshold: 0.18 });
        for (var j = 0; j < targets.length; j++) {
          observer.observe(targets[j]);
        }
      }

      function initParallax() {
        var ticking = false;
        function updateParallax() {
          var y = (window.scrollY || 0) * 0.08;
          document.documentElement.style.setProperty('--skills-parallax-y', y.toFixed(2) + 'px');
          ticking = false;
        }
        window.addEventListener('scroll', function() {
          if (!ticking) {
            window.requestAnimationFrame(updateParallax);
            ticking = true;
          }
        }, { passive: true });
        updateParallax();
      }

      function initTabsAndProgress() {
        var tageWert = document.getElementById('skills-days-value');
        var percentLabel = document.getElementById('skills-progress-percent');
        var fill = document.getElementById('skills-progress-fill');
        var track = document.querySelector('.skills-progress__track');
        var arbeitstageImMonat = 30;
        var aktuelleArbeitstage = 8;

        function updateFromDays(tage) {
          var sichereTage = Number(tage);
          if (!isFinite(sichereTage) || sichereTage < 0) sichereTage = 0;
          if (sichereTage > arbeitstageImMonat) sichereTage = arbeitstageImMonat;
          var percent = (sichereTage / arbeitstageImMonat) * 100;
          if (tageWert) tageWert.textContent = String(sichereTage);
          if (percentLabel) percentLabel.textContent = sichereTage + '/' + arbeitstageImMonat + ' Tage';
          if (fill) fill.style.width = percent + '%';
          if (track) track.setAttribute('aria-valuenow', String(sichereTage));
        }

        updateFromDays(aktuelleArbeitstage);
      }

      var el = document.getElementById('neuigkeiten-markdown');
      fetch('neuigkeiten.md')
        .then(function(r) { return r.text(); })
        .then(function(md) {
          if (typeof marked !== 'undefined') {
            el.innerHTML = marked.parse(md);
          } else {
            el.innerHTML = '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
          }
          setzeArbeitslosDauer();
          initScrollReveal(el);
          initTabsAndProgress();
          initParallax();
        })
        .catch(function() {
          el.innerHTML = '<p>Die Datei <code>neuigkeiten.md</code> konnte nicht geladen werden.</p>';
          initTabsAndProgress();
          initParallax();
        });
    })();
  </script>
  <script src="script.js?v=20260420"></script>
</body>
</html>
