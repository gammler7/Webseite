<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neuigkeiten</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="main-nav" aria-label="Hauptnavigation">
    <ul>
      <li><a href="index.html">Startseite</a></li>
      <li><a href="neuigkeiten.html" class="active">Neuigkeiten</a></li>
    </ul>
  </nav>
  <div class="content content-neuigkeiten">
    <div id="neuigkeiten-markdown" class="markdown-content" aria-live="polite">
      <p>Lade Neuigkeiten …</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      function setzeArbeitslosDauer() {
        var span = document.getElementById('arbeitslos-dauer');
        if (!span) return;
        var start = new Date(2025, 6, 2);  // 2. Juli 2025
        var heute = new Date();
        start.setHours(0, 0, 0, 0);
        heute.setHours(0, 0, 0, 0);
        var monate = 0;
        var d = new Date(start.getTime());
        while (true) {
          var naechster = new Date(d.getFullYear(), d.getMonth() + 1, d.getDate());
          if (naechster > heute) break;
          d = naechster;
          monate++;
        }
        var tage = Math.floor((heute - d) / (1000 * 60 * 60 * 24));
        span.textContent = monate + ' Monate und ' + tage + ' Tage';
      }

      var el = document.getElementById('neuigkeiten-markdown');
      fetch('neuigkeiten.md')
        .then(function(r) { return r.text(); })
        .then(function(md) {
          if (typeof marked !== 'undefined') {
            el.innerHTML = marked.parse(md);
          } else {
            el.innerHTML = '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
          }
          setzeArbeitslosDauer();
        })
        .catch(function() {
          el.innerHTML = '<p>Die Datei <code>neuigkeiten.md</code> konnte nicht geladen werden.</p>';
        });
    })();
  </script>
  <script src="script.js"></script>
</body>
</html>
